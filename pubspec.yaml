name: future_life
description: "Life Simulator - See where your daily habits will take you."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Charts
  fl_chart: ^0.69.0

  # Internationalization
  intl: ^0.20.2

  # Animations
  flutter_animate: ^4.5.0

  # Typography
  google_fonts: ^6.2.1

  # Unique IDs
  uuid: ^4.4.2
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.5.4
  google_nav_bar: ^5.0.7

  # Network
  dio: ^5.7.0
  retrofit: ^4.4.1
  logger: ^2.4.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf

    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
